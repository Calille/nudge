appId: com.nudgemail.app
productName: NudgeMail
asar: true
asarUnpack:
  - "**/*.{node,dll}"
directories:
  output: release
  buildResources: build
files:
  - "dist-electron/**/*"
  - "dist/**/*"
  - "package.json"
  - "!node_modules/*/{test,__tests__,docs,example,examples}/**/*"
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  icon: build/icon.icns
  category: public.app-category.business
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
